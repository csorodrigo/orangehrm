GetOne:
  'with valid report name':
    userId: 1
    services:
      core.class_helper: \CiaFerias\Core\Helper\ClassHelper
      core.config_service: \CiaFerias\Core\Service\ConfigService
      admin.user_service: \CiaFerias\Admin\Service\UserService
      pim.employee_service: \CiaFerias\Pim\Service\EmployeeService
      core.authorization.user_role_manager_helper: \CiaFerias\Core\Authorization\Helper\UserRoleManagerHelper
      i18n.i18n_helper: \CiaFerias\I18N\Service\I18NHelper
    factories:
      core.authorization.user_role_manager: [ '\CiaFerias\Core\Authorization\Manager\UserRoleManagerFactory', 'getNewUserRoleManager' ]
    query:
      name: 'leave_type_leave_entitlements_and_usage'
    data:
      "headers": [
        {
          "name": "Employee",
          "prop": "employeeName",
          "size": 150,
          "pin": "colPinStart",
          "cellProperties": null
        },
        {
          "name": "Leave Entitlements (Days)",
          "prop": "entitlementDays",
          "size": 150,
          "pin": null,
          "cellProperties": {
            "class": {
              "col-alt": true,
              "cell-action": true
            }
          }
        },
        {
          "name": "Leave Pending Approval (Days)",
          "prop": "pendingApprovalDays",
          "size": 150,
          "pin": null,
          "cellProperties": {
            "class": {
              "cell-action": true
            }
          }
        },
        {
          "name": "Leave Scheduled (Days)",
          "prop": "scheduledDays",
          "size": 150,
          "pin": null,
          "cellProperties": {
            "class": {
              "cell-action": true
            }
          }
        },
        {
          "name": "Leave Taken (Days)",
          "prop": "takenDays",
          "size": 150,
          "pin": null,
          "cellProperties": {
            "class": {
              "cell-action": true
            }
          }
        },
        {
          "name": "Leave Balance (Days)",
          "prop": "balanceDays",
          "size": 150,
          "pin": null,
          "cellProperties": {
            "class": {
              "col-alt": true
            }
          }
        }
      ],
      "filters": [ ]
    meta:
      headers: null
      filters: null

  'with invalid report name':
    userId: 1
    services:
      core.class_helper: \CiaFerias\Core\Helper\ClassHelper
      core.config_service: \CiaFerias\Core\Service\ConfigService
      admin.user_service: \CiaFerias\Admin\Service\UserService
      pim.employee_service: \CiaFerias\Pim\Service\EmployeeService
      core.authorization.user_role_manager_helper: \CiaFerias\Core\Authorization\Helper\UserRoleManagerHelper
    factories:
      core.authorization.user_role_manager: [ '\CiaFerias\Core\Authorization\Manager\UserRoleManagerFactory', 'getNewUserRoleManager' ]
    query:
      name: 'invalid'
    exception:
      class: '\CiaFerias\Core\Api\V2\Exception\BadRequestException'
      message: 'Invalid report name'
