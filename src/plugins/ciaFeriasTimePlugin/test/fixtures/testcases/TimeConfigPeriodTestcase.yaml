Update:
  'Timesheet period update':
    userId: 1
    services:
      core.config_service: \CiaFerias\Core\Service\ConfigService
      core.menu_service: \CiaFerias\Core\Service\MenuService
    hooks:
      preAssertValidTestCase: [ '\CiaFerias\Tests\Time\Api\TimeConfigPeriodAPITest', 'getOnePreHook' ]
    body:
      startDay: 2
    query: [ ]
    data:
      startDay: '2'
    meta: [ ]

  'Timesheet period update when already defined':
    userId: 1
    services:
      core.config_service: \CiaFerias\Core\Service\ConfigService
      core.menu_service: \CiaFerias\Core\Service\MenuService
    body:
      startDay: 2
    exception:
      class: '\CiaFerias\Core\Api\V2\Exception\BadRequestException'
      message: 'Already defined'
