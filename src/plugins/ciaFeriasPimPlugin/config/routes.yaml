  controller: CiaFerias\Pim\Controller\EmpUsTaxExemptionController::handle
  methods: [ GET ]

pim_employee_csv_import:
  path: /pim/pimCsvImport
  controller: CiaFerias\Pim\Controller\EmployeeCsvImportController::handle
  methods: [ GET ]

pim_view_employee_reports:
  path: /pim/viewDefinedPredefinedReports
  controller: CiaFerias\Pim\Controller\EmployeeReportController::handle
  methods: [ GET ]

pim_save_employee_reports:
  path: /pim/definePredefinedReport
  controller: CiaFerias\Pim\Controller\SaveEmployeeReportController::handle
  methods: [ GET ]

pim_edit_employee_reports:
  path: /pim/definePredefinedReport/{id}
  controller: CiaFerias\Pim\Controller\SaveEmployeeReportController::handle
  methods: [ GET ]

pim_display_employee_report:
  path: /pim/displayPredefinedReport/{id}
  controller: CiaFerias\Pim\Controller\EmployeeReportController::handle
  methods: [ GET ]

update_password:
  path: /pim/updatePassword
  controller: CiaFerias\Pim\Controller\UpdatePasswordController::handle
  methods: [ GET ]
