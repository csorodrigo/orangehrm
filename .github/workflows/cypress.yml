name: Cypress

on: [ push, pull_request ]

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Build and start CIA Férias
        run: |
          docker compose -f docker-compose.local.yml up -d --build
          docker compose -f docker-compose.local.yml ps

      - name: Wait for CIA Férias
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8081/web/index.php/auth/login > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.local.yml logs
          exit 1

      - name: Prepare functional data
        run: docker compose -f docker-compose.local.yml exec -T cia-ferias php src/test/functional/tools/prepare.php

      - name: Install Cypress dependencies
        run: |
          cd src/test/functional
          yarn install --immutable

      - name: Run Cypress tests
        run: |
          cd src/test/functional
          export CYPRESS_BASE_URL=http://localhost:8081/web/index.php
          export CYPRESS_VIDEO=true
          export CYPRESS_DEFAULT_COMMAND_TIMEOUT=10000
          yarn test

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-videos-${{ github.sha }}
          path: src/test/functional/cypress/videos

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-screenshots-${{ github.sha }}
          path: src/test/functional/cypress/screenshots

      - name: Capture container logs
        if: ${{ always() }}
        run: docker compose -f docker-compose.local.yml logs > /tmp/cia-ferias-container.log

      - name: Upload container logs
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cia-ferias-container-logs-${{ github.sha }}
          path: /tmp/cia-ferias-container.log
